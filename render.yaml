services:
  - type: web
    name: school-backend
    env: node
    runtime: node-18
    region: singapore
    plan: standard
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    healthCheckInterval: 15
    autoScaleFactor: 5
    autoScaleMax: 3
    autoScaleMin: 1
    numInstances: 1
    maxInstanceCount: 3
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
